<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Ma Galerie Photos</title>
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/header.css">
    <link rel="stylesheet" type="text/css" href="css/gallery.css">
    <link rel="stylesheet" type="text/css" href="css/footer.css">
    <link rel="stylesheet" type="text/css" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="galerie-page">
    <div class="container">
        <header class="main-header">
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="photographie.html">Photographie</a></li>
                    <li><a href="galerie.html" class="active">Galerie</a></li>
                    <li><a href="personnalisation.html">Personnalisation</a></li>
                </ul>
            </nav>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Thème clair ou sombre">
                <i class="fas fa-moon"></i>
            </button>
            <h1>Galerie Photos</h1>
            <p class="subtitle">Mélange de photos prises avec appareil photo et iPhone</p>
        </header>

        <main class="main-content">
            <p class="gallery-intro">Cette galerie regroupe toutes mes photos favorites, peu importe l'appareil utilisé.</p>
            <div class="gallery-filters" id="gallery-filters">
                <button class="filter-btn active" data-filter="all" type="button">Toutes</button>
                <button class="filter-btn" data-filter="camera" type="button">Appareil photo</button>
                <button class="filter-btn" data-filter="phone" type="button">iPhone</button>
            </div>
            <div class="gallery" id="gallery-grid" data-page="galerie"></div>
        </main>

        <footer class="main-footer">
            <p>&copy; 2024 Ma Galerie Photos - Tous droits réservés</p>
        </footer>
    </div>
    <script src="js/theme.js"></script>
    <script src="js/photo-data.js"></script>
    <script src="js/gallery-loader.js"></script>
    <script src="js/ui-behavior.js"></script>
</body>
</html>
